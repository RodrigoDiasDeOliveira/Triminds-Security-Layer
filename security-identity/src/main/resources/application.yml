spring:
  application:
    name: security-identity
  datasource:
    url: ${IDENTITY_DB_URL:jdbc:postgresql://localhost:5432/triminds_identity}
    username: ${IDENTITY_DB_USER:triminds}
    password: ${IDENTITY_DB_PASSWORD:triminds}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: ${IDENTITY_PORT:8081}

management:
  endpoints.web.exposure.include: health,info,prometheus,metrics
  endpoint.health.show-details: when_authorized
