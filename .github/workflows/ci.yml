name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: triminds
          POSTGRES_PASSWORD: triminds
          POSTGRES_DB: triminds
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U triminds"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B -ntp verify

