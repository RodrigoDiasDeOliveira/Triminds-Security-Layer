server:
  port: 8080

spring:
  application:
    name: security-gateway

  config:
    import: optional:classpath:application-admin.yml   # ← Importante

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWKS_URI:http://security-auth:8080/.well-known/jwks.json}

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            key-resolver: "#{@userKeyResolver}"

      routes:
        # Rotas Admin (mais específicas primeiro)
        - id: admin
          uri: http://localhost:8080
          predicates: [ "Path=/admin/**" ]
          filters: [ "StripPrefix=0" ]

        - id: auth
          uri: ${AUTH_URL:http://security-auth:8080}
          predicates: [ "Path=/auth/**" ]

        - id: identity
          uri: ${IDENTITY_URL:http://security-identity:8080}
          predicates: [ "Path=/api/identity/**" ]
          filters: [ "StripPrefix=2" ]

        - id: access
          uri: ${ACCESS_URL:http://security-access-control:8080}
          predicates: [ "Path=/api/access/**" ]
          filters: [ "StripPrefix=1" ]

        - id: policies
          uri: ${POLICY_URL:http://security-policy-engine:8080}
          predicates: [ "Path=/api/policies/**" ]
          filters: [ "StripPrefix=1" ]

        - id: risk
          uri: ${RISK_URL:http://security-risk-engine:8080}
          predicates: [ "Path=/api/risk/**" ]
          filters: [ "StripPrefix=1" ]

        - id: audit
          uri: ${AUDIT_URL:http://security-audit:8080}
          predicates: [ "Path=/api/audit/**" ]
          filters: [ "StripPrefix=1" ]

        - id: intel
          uri: ${INTEL_URL:http://security-intelligence:8080}
          predicates: [ "Path=/api/intel/**" ]
          filters: [ "StripPrefix=1" ]

access-control:
  url: ${ACCESS_URL:http://security-access-control:8080}
  enforce-prefixes: /api/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway