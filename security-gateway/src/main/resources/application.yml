server: { port: 8080 }
spring:
  application: { name: security-gateway }
  data:
    redis: { host: ${REDIS_HOST:localhost}, port: ${REDIS_PORT:6379} }
  security:
    oauth2:
      resourceserver:
        jwt: { jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:8082/.well-known/jwks.json} }
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100
            key-resolver: "#{@userKeyResolver}"
      routes:
        - id: identity
          uri: ${IDENTITY_URL:http://localhost:8081}
          predicates: [ "Path=/api/identity/**" ]
          filters:    [ "StripPrefix=2" ]
        - id: auth
          uri: ${AUTH_URL:http://localhost:8082}
          predicates: [ "Path=/auth/**" ]
        - id: access
          uri: ${ACCESS_URL:http://localhost:8083}
          predicates: [ "Path=/api/access/**" ]
          filters:    [ "StripPrefix=1" ]
        - id: policies
          uri: ${POLICY_URL:http://localhost:8084}
          predicates: [ "Path=/api/policies/**" ]
          filters:    [ "StripPrefix=1" ]
        - id: audit
          uri: ${AUDIT_URL:http://localhost:8088}
          predicates: [ "Path=/api/audit/**" ]
          filters:    [ "StripPrefix=1" ]
        - id: risk
          uri: ${RISK_URL:http://localhost:8086}
          predicates: [ "Path=/api/risk/**" ]
          filters:    [ "StripPrefix=1" ]
        - id: intel
          uri: ${INTEL_URL:http://localhost:8087}
          predicates: [ "Path=/api/intel/**" ]
          filters:    [ "StripPrefix=1" ]

access-control:
  url: ${ACCESS_URL:http://localhost:8083}
  enforce-prefixes: /api/

management:
  endpoints:
    web:
      exposure: { include: health,info,prometheus,gateway }
