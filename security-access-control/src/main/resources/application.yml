spring:
  application:
    name: triminds-security-access-control
  datasource:
    url: ${ACCESS_DB_URL:jdbc:postgresql://localhost:5432/triminds_access}
    username: ${ACCESS_DB_USER:triminds}
    password: ${ACCESS_DB_PASS:triminds}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
server:
  port: ${PORT:8082}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
triminds:
  access:
    default-role: USER
